name: Nekogram Build

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive  # Telegram项目可能包含子模块
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: false
        
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Build APK (Debug)
      run: ./gradlew assembleDebug
      
    - name: Build APK (Release)
      run: ./gradlew assembleRelease
      env:
        
    - name: Upload debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: nekogram-debug
        path: |
          TMessagesProj/build/outputs/apk/debug/*.apk
          TMessagesProj/build/outputs/apk/debug/*.aab
        if-no-files-found: warn
        
    - name: Upload release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: nekogram-release
        path: |
          TMessagesProj/build/outputs/apk/release/*.apk
          TMessagesProj/build/outputs/apk/release/*.aab
        if-no-files-found: warn
        
    - name: List build outputs
      run: |
        echo "=== Build Outputs ==="
        find . -name "*.apk" -o -name "*.aab" | head -20
        echo "===================="

