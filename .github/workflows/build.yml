name: Build Nekogram (Test-Signed Release)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.1.0'
  ANDROID_NDK_VERSION: '27.3.13750724'
  CMAKE_VERSION: '3.22.1'
  APP_MODULE: 'TMessagesProj_App'

jobs:
  build:
    name: Build and Test-Sign
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code and submodules
        id: checkout-step
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        id: setup-java-step
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK, NDK and CMake
        id: android-setup-step
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}
          ndk-version: ${{ env.ANDROID_NDK_VERSION }}
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Configure Android NDK and CMake Environment
        id: configure-ndk-step
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "CMAKE_BIN_PATH=$(which cmake)" >> $GITHUB_ENV
          echo "===== Environment Configured ====="
          echo "ANDROID_NDK_ROOT: $ANDROID_NDK_ROOT"
          echo "NDK_ROOT: $NDK_ROOT"

      - name: Make gradlew executable
        id: make-gradlew-step
        run: chmod +x ./gradlew

      - name: Create Debug Keystore for Test Signing
        id: create-keystore-step
        run: |
          KEYSTORE_PATH="$HOME/.android/debug.keystore"
          mkdir -p "$(dirname "$KEYSTORE_PATH")"
          if [ ! -f "$KEYSTORE_PATH" ]; then
            keytool -genkeypair -v \
              -keystore "$KEYSTORE_PATH" \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug, O=Android, C=US"
          fi
          echo "keystore_path=$KEYSTORE_PATH" >> $GITHUB_OUTPUT

      - name: Cache Gradle Dependencies
        id: cache-gradle-step
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/debug.keystore
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Release APK with Test Signing
        id: build-release-apk-step
        run: |
          echo "Building Release APK (Test-Signed)..."
          echo "Using NDK: $ANDROID_NDK_ROOT"
          
          ./gradlew :${{ env.APP_MODULE }}:assembleRelease \
            -Pandroid.injected.signing.store.file=${{ steps.create-keystore-step.outputs.keystore_path }} \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android \
            -Pandroid.ndk.path="$ANDROID_NDK_ROOT" \
            --stacktrace \
            --info \
            --no-daemon

      - name: Build Release AAB with Test Signing
        id: build-release-aab-step
        run: |
          echo "Building Release AAB (Test-Signed)..."
          ./gradlew :${{ env.APP_MODULE }}:bundleRelease \
            -Pandroid.injected.signing.store.file=${{ steps.create-keystore-step.outputs.keystore_path }} \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android \
            -Pandroid.ndk.path="$ANDROID_NDK_ROOT" \
            --stacktrace \
            --info \
            --no-daemon

      - name: Verify and List Build Outputs
        id: verify-outputs-step
        if: success()
        run: |
          echo "=== Generated Artifacts ==="
          find ${{ env.APP_MODULE }}/build/outputs -name "*.apk" -o -name "*.aab" | xargs -I {} ls -lh {} 2>/dev/null || echo "No outputs found in standard path."

      - name: Upload APK Artifact
        id: upload-apk-step
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nekogram-test-signed-release-apk
          path: ${{ env.APP_MODULE }}/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload AAB Artifact
        id: upload-aab-step
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nekogram-test-signed-release-aab
          path: ${{ env.APP_MODULE }}/build/outputs/bundle/release/*.aab
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Build Reports on Failure
        id: upload-reports-step
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-reports
          path: |
            **/build/reports/**/*.html
            **/*.log
          retention-days: 7
          if-no-files-found: ignore
