name: Build Nekogram (Test-Signed Release)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  # 项目配置 (必须与 build.gradle 一致)
  JAVA_VERSION: '21'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.1.0'
  ANDROID_NDK_VERSION: '27.3.13750724'
  CMAKE_VERSION: '3.22.1'
  APP_MODULE: 'TMessagesProj_App'

jobs:
  build:
    name: Build and Test-Sign
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code and submodules
        id: checkout-step
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        id: setup-java-step
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      # 【关键修复】强制自动接受 Android SDK 许可证
      - name: Setup Android SDK, NDK and CMake
        id: android-setup-step
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}
          ndk-version: ${{ env.ANDROID_NDK_VERSION }}
          cmake-version: ${{ env.CMAKE_VERSION }}
          cmdline-tools-version: '12266719'
          # 以下两行确保自动接受所有许可证
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: true
          add-to-path: true

      - name: Configure Android NDK and CMake Environment
        id: configure-ndk-step
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "=== Android NDK Path ==="
          echo "$ANDROID_NDK_ROOT"

      - name: Make gradlew executable
        id: make-gradlew-step
        run: chmod +x ./gradlew

      - name: Create Debug Keystore for Test Signing
        id: create-keystore-step
        run: |
          KEYSTORE_PATH="$HOME/.android/debug.keystore"
          mkdir -p "$(dirname "$KEYSTORE_PATH")"
          
          if [ ! -f "$KEYSTORE_PATH" ]; then
            echo "Creating new debug keystore for test signing..."
            keytool -genkeypair -v \
              -keystore "$KEYSTORE_PATH" \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug, O=Android, C=US"
            echo "✅ Debug keystore created at: $KEYSTORE_PATH"
          else
            echo "✅ Using existing debug keystore at: $KEYSTORE_PATH"
          fi
          
          echo "keystore_path=$KEYSTORE_PATH" >> $GITHUB_OUTPUT
          ls -lh "$KEYSTORE_PATH"

      - name: Cache Gradle Dependencies
        id: cache-gradle-step
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/debug.keystore
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Release APK with Test Signing
        id: build-release-apk-step
        run: |
          echo "Building Release APK (Test-Signed)..."
          echo "NDK Path: $ANDROID_NDK_ROOT"
          echo "Keystore Path: ${{ steps.create-keystore-step.outputs.keystore_path }}"
          
          ./gradlew :${{ env.APP_MODULE }}:assembleRelease \
            -Pandroid.injected.signing.store.file=${{ steps.create-keystore-step.outputs.keystore_path }} \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android \
            -Pandroid.ndk.path="$ANDROID_NDK_ROOT" \
            --stacktrace \
            --no-daemon \
            --warning-mode=all

      - name: Build Release AAB with Test Signing
        id: build-release-aab-step
        run: |
          echo "Building Release AAB (Test-Signed)..."
          
          ./gradlew :${{ env.APP_MODULE }}:bundleRelease \
            -Pandroid.injected.signing.store.file=${{ steps.create-keystore-step.outputs.keystore_path }} \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android \
            -Pandroid.ndk.path="$ANDROID_NDK_ROOT" \
            --stacktrace \
            --no-daemon \
            --warning-mode=all

      - name: Verify and List Build Outputs
        id: verify-outputs-step
        if: success()
        run: |
          echo "=== Build Artifacts Verification ==="
          
          APK_DIR="${{ env.APP_MODULE }}/build/outputs/apk/release"
          AAB_DIR="${{ env.APP_MODULE }}/build/outputs/bundle/release"
          
          if [ -d "$APK_DIR" ]; then
            echo "📦 APK files found:"
            find "$APK_DIR" -name "*.apk" -exec ls -lh {} \;
          else
            echo "⚠ No APK directory found at: $APK_DIR"
          fi
          
          if [ -d "$AAB_DIR" ]; then
            echo "📦 AAB files found:"
            find "$AAB_DIR" -name "*.aab" -exec ls -lh {} \;
          else
            echo "ℹ No AAB directory found at: $AAB_DIR"
          fi
          
          echo "=== Verification Complete ==="

      - name: Upload APK Artifact
        id: upload-apk-step
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nekogram-test-signed-release-apk
          path: ${{ env.APP_MODULE }}/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error
          compression-level: 0

      - name: Upload AAB Artifact
        id: upload-aab-step
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nekogram-test-signed-release-aab
          path: ${{ env.APP_MODULE }}/build/outputs/bundle/release/*.aab
          retention-days: 30
          if-no-files-found: warn
          compression-level: 0

      - name: Upload Build Reports on Failure
        id: upload-reports-step
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-reports
          path: |
            **/build/reports/
            **/*.log
            **/build/**/*.html
          retention-days: 7
          if-no-files-found: ignore
