name: Build Test-Signed Nekogram Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-test-release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v1
      with:
      cmake-version: '3.22.1'
  
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        sdk-platform: android-36
        sdk-build-tools: 36.1.0
        ndk-version: 27.3.13750724
        
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Create debug keystore
      run: |
        mkdir -p $HOME/.android
        if [ ! -f $HOME/.android/debug.keystore ]; then
          keytool -genkey -v \
            -keystore $HOME/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug, O=Android, C=US"
        fi
        
    - name: Configure test signing
      run: |
        echo "Configuring test signing for release build..."
        # Create or update local.properties with test signing config
        cat >> local.properties << EOF
               storeFile=$HOME/.android/debug.keystore
              storePassword=android
              keyAlias=androiddebugkey
              keyPassword=android
              EOF
        
    - name: Build test-signed release
      run: |
        # Build release variant with test signing
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=$HOME/.android/debug.keystore \
          -Pandroid.injected.signing.store.password=android \
          -Pandroid.injected.signing.key.alias=androiddebugkey \
          -Pandroid.injected.signing.key.password=android
        
    - name: Verify build outputs
      run: |
        echo "Build outputs:"
        find . -name "*.apk" -type f 2>/dev/null | while read file; do
          if [ -f "$file" ]; then
            echo "- $file ($(du -h "$file" | cut -f1))"
          fi
        done
        
    - name: Upload release APK
      uses: actions/upload-artifact@v4
      with:
        name: nekogram-test-release
        path: |
          **/build/outputs/apk/release/*.apk
        retention-days: 30
        
  - name: Upload AAB bundle
      uses: actions/upload-artifact@v4
      with:
        name: nekogram-test-bundle
        path: |
          **/build/outputs/bundle/release/*.aab
        retention-days: 30
