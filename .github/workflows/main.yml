name: Nekogram Build

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive  # Telegram项目可能包含子模块
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: false
        
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Create debug keystore
      run: |
        if [ ! -f ~/.config/.android/debug.keystore ]
        then
          echo "生成调试签名密钥..."
          keytool -genkey -v \
            -keystore ~/.config/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug, O=Android, C=US"
          echo "调试密钥已生成并缓存"
        else
          echo "使用缓存的调试密钥"
        fi
        
    - name: Build Debug APK (测试签名)
      run: |
        ./gradlew assembleDebug assembleRelease
      env:
        
        ANDROID_DEBUG_KEYSTORE: ~/.config/.android/debug.keystore
    
        ORG_GRADLE_PROJECT_DEBUG_KEY_STORE: ~/.config/.android/debug.keystore
        ORG_GRADLE_PROJECT_DEBUG_KEY_STORE_PASSWORD: android
        ORG_GRADLE_PROJECT_DEBUG_KEY_ALIAS: androiddebugkey
        ORG_GRADLE_PROJECT_DEBUG_KEY_ALIAS_PASSWORD: android
        
    - name: Upload debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: nekogram-debug
        path: |
          TMessagesProj/build/outputs/apk/debug/*.apk
          TMessagesProj/build/outputs/apk/debug/*.aab
        if-no-files-found: warn
        
    - name: Upload release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: nekogram-release
        path: |
          TMessagesProj/build/outputs/apk/release/*.apk
          TMessagesProj/build/outputs/apk/release/*.aab
        if-no-files-found: warn
        
    - name: List build outputs
      run: |
        echo "=== Build Outputs ==="
        find . -name "*.apk" -o -name "*.aab" | head -20
        echo "===================="

